<!DOCTYPE html>
<html>

<head>
  <style>
    .bar {
      width: 100%;
      background: lightgray;
    }

    .fill {
      background: green;
      color: white;
    }
  </style>
</head>

<body>

  <p>HTML</p>
  <div class="bar">
    <div class="fill" style="width:80%">80%</div>
  </div>

  <p>CSS</p>
  <div class="bar">
    <div class="fill" style="width:60%">60%</div>
  </div>

  <p>JavaScript</p>
  <div class="bar">
    <div class="fill" style="width:70%">70%</div>
  </div>

</body>

</html>
