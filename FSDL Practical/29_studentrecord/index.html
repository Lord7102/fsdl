<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Record Management</title>
    <style>
        body{
            padding:10px;
            width:250px;
            margin:auto;
            border: 1px solid black;
            font-family:Arial;
            text-align:center;
        }
        input{
            padding:10px;
            margin:10px;
            width:200px;
        }
        button{
            padding:5px 10px;
            background-color: green;
        }
    </style>
</head>
<body>
    <h1>Student Record Management</h1>
    <form action="/add" method="POST">
        <input type="text" name="Name" placeholder="Enter Your Name" required><br>
        <input type="text" name="Rollno" placeholder="Enter Your RollNo" required><br>
        <input type="text" name="Branch" placeholder="Enter Your Branch" required><br>
        <button type="Submit">Add Student</button>
    </form>
    <a href="/view">View Students</a>
</body>
</html>
