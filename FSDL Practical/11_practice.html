<!DOCTYPE html>
<html>

<body>

    <h2>Shopping Cart</h2>

    <p>Product: Laptop (₹50000)</p>

    <button onclick="change(-1)">-</button>
    <span id="qty">1</span>
    <button onclick="change(1)">+</button>

    <p>Total: ₹<span id="total">50000</span></p>

    <script>
        var price = 50000;
        var qty = 1;

        function change(val) {
            qty = qty + val;

            if (qty < 1) qty = 1;

            document.getElementById("qty").innerText = qty;
            document.getElementById("total").innerText = qty * price;
        }
    </script>

</body>

</html>
